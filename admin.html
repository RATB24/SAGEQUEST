<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sage Quest - Admin</title>
    <script>
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', theme);
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<!-- El contenido inicia oculto para proteger la vista -->
<div id="admin-content" class="container mt-4 d-none">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>Panel Administrativo</h1>
        <div>
            <button class="btn btn-outline-secondary me-2" onclick="toggleDarkMode()">🌙</button>
            <button class="btn btn-outline-success me-2" onclick="cargarDatosEjemplo()">Cargar Datos de Ejemplo</button>
            <a href="index.html" class="btn btn-secondary">Volver al Inicio</a>
        </div>
    </div>

    <div class="row">
        <!-- Crear Categoría -->
        <div class="col-md-5 mb-4">
            <div class="card p-4 shadow-sm">
                <h4>Crear Categoría</h4>
                <input id="cat-nombre" class="form-control mb-2" placeholder="Nombre de la categoría (ej: Historia)">
                <button class="btn btn-dark w-100" onclick="crearCategoria()">Guardar Categoría</button>
                
                <hr>
                <h6>Listado de Categorías</h6>
                <ul id="lista-categorias-admin" class="list-group list-group-flush small">
                    <!-- Se llena con JS -->
                </ul>
            </div>
        </div>

        <!-- Crear Pregunta -->
        <div class="col-md-7">
            <div class="card p-4 shadow-sm">
                <h4 id="titulo-pregunta">Nueva Pregunta</h4>
                <input type="hidden" id="pregunta-id-edit">
                <select id="pre-categoria" class="form-select mb-2">
                    <option value="">Selecciona una categoría...</option>
                </select>
                <textarea id="pre-enunciado" class="form-control mb-2" placeholder="Enunciado de la pregunta"></textarea>
                <div id="opciones-container">
                    <input class="form-control mb-1 opcion" placeholder="Opción A (Correcta)">
                    <input class="form-control mb-1 opcion" placeholder="Opción B">
                    <input class="form-control mb-1 opcion" placeholder="Opción C">
                    <input class="form-control mb-1 opcion" placeholder="Opción D">
                </div>
                <div class="d-flex gap-2 mt-2">
                    <button id="btn-guardar-pregunta" class="btn btn-primary w-100" onclick="crearPregunta()">Guardar Pregunta</button>
                    <button id="btn-cancelar-edit" class="btn btn-secondary d-none" onclick="cancelarEdicionPregunta()">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Lista de Usuarios -->
    <div class="row mt-4">
        <div class="col-12">
            <div class="card p-4 shadow-sm">
                <h4>Usuarios en la Base de Datos</h4>
                <div class="table-responsive">
                    <table class="table table-hover mt-2">
                        <thead class="table-dark">
                            <tr>
                                <th>Email</th>
                                <th>Rol</th>
                            </tr>
                        </thead>
                        <tbody id="lista-usuarios">
                            <!-- Se llena con JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Tabla de Preguntas -->
    <div class="row mt-4 pb-5">
        <div class="col-12">
            <div class="card p-4 shadow-sm">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h4>Gestión de Preguntas</h4>
                    <select id="filtro-categoria-admin" class="form-select w-50" onchange="cargarPreguntas(this.value)">
                        <option value="">Todas las categorías</option>
                    </select>
                </div>
                <div class="table-responsive">
                    <table class="table table-sm align-middle mt-2">
                        <thead class="table-dark">
                            <tr>
                                <th>Pregunta</th>
                                <th>Categoría</th>
                                <th class="text-end">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="lista-preguntas-admin"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="module" src="js/admin.js"></script>
</body>
</html>
