<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sage Quest - Jugando</title>
    <script>
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', theme);
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container mt-5">
    <!-- Configuración inicial -->
    <div id="setup-container" class="card p-4 mx-auto shadow-sm w-100" style="max-width: 500px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">Configura tu Partida</h2>
            <button class="btn btn-sm btn-outline-secondary" onclick="toggleDarkMode()">🌙</button>
        </div>
        <label class="form-label">Selecciona una Categoría:</label>
        <select id="select-categoria" class="form-select mb-4">
            <option value="mixta">Mixta (Cualquier categoría)</option>
        </select>
        <button class="btn btn-primary w-100 btn-lg" onclick="iniciarJuego()">¡Empezar a Jugar!</button>
        <div class="text-center mt-3">
            <a href="index.html" class="text-secondary">Volver al inicio</a>
        </div>
    </div>

    <!-- Pantalla de Juego -->
    <div id="game-container" class="card p-4 mx-auto shadow-sm d-none w-100" style="max-width: 700px;">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="badge bg-dark p-2" id="info-progreso">Pregunta 1 de 10</span>
            <span class="badge bg-danger p-2" id="info-tiempo">Tiempo: 15s</span>
        </div>
        
        <div class="progress mb-4" style="height: 10px;">
            <div id="progreso-barra" class="progress-bar" style="width: 10%;"></div>
        </div>

        <h3 id="pregunta-texto" class="mb-4">Cargando pregunta...</h3>
        
        <div id="opciones-container" class="d-grid gap-2">
            <!-- Botones de opciones generados por JS -->
        </div>
    </div>

    <!-- Resultado Final -->
    <div id="result-container" class="card p-5 mx-auto shadow-sm d-none text-center w-100" style="max-width: 500px;">
        <h2 class="display-4">🏁</h2>
        <h2>¡Juego Terminado!</h2>
        <p class="lead" id="puntaje-final"></p>
        <button class="btn btn-primary w-100" onclick="location.reload()">Jugar de Nuevo</button>
        <a href="index.html" class="btn btn-outline-secondary w-100 mt-2">Ir al Inicio</a>
    </div>
</div>
<!-- Elementos de Audio para feedback -->
<audio id="correct-sound" src="sounds/correct.mp3" preload="auto"></audio>
<audio id="incorrect-sound" src="sounds/incorrect.mp3" preload="auto"></audio>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Confeti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script type="module" src="js/jugar.js"></script>
</body>
</html>
