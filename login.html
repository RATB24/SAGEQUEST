<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script>
        const theme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', theme);
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <div class="card p-4 mx-auto w-100" style="max-width:400px">

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="mb-0">Iniciar Sesión</h2>
            <button class="btn btn-sm btn-outline-secondary" onclick="toggleDarkMode()">🌙</button>
        </div>

        <input id="email" class="form-control mb-2" placeholder="Correo">

        <input id="password" type="password" class="form-control mb-3" placeholder="Contraseña">

        <button class="btn btn-dark" onclick="login()">
            Entrar
        </button>

        <div class="mt-3 text-center">
            <p class="mb-1">¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
            <a href="index.html" class="text-secondary small">Volver al Inicio</a>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script type="module" src="js/login.js"></script>

</body>
</html>
